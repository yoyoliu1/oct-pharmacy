<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猛健樂計算機</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@300..700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* 基礎圓潤可愛風設定 */
        body {
            background-color: #fcfaf6; /* 溫潤的日系焙茶暖白底色 */
            color: #4a2e1b; /* 全域黑色改為深褐色 */
            font-family: 'Fredoka', 'Noto Sans TC', "Microsoft JhengHei", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 標題與特殊數字專用玩味字體 */
        .font-bungee {
            font-family: 'Bungee', 'Noto Sans TC', sans-serif;
        }

        /* 獨家精緻：第一步驟筆蓋拔起教學小動畫 */
        .pen-container {
            position: relative;
            width: 50px;
            height: 90px;
            margin: 0 auto;
        }
        .pen-body {
            position: absolute;
            bottom: 5px;
            left: 13px;
            width: 24px;
            height: 50px;
            background: linear-gradient(135deg, #eaddca, #c6a47e);
            border: 2px solid #4a2e1b;
            border-radius: 0 0 6px 6px;
        }
        .pen-inner-membrane {
            position: absolute;
            top: -6px;
            left: 6px;
            width: 8px;
            height: 6px;
            background-color: #e11d48; /* 紅色內膜 */
            border: 1px solid #4a2e1b;
            border-radius: 2px 2px 0 0;
        }
        .pen-cap {
            position: absolute;
            top: 15px;
            left: 10px;
            width: 30px;
            height: 32px;
            background: linear-gradient(135deg, #b0906f, #8c6f51);
            border: 2px solid #4a2e1b;
            border-radius: 8px 8px 4px 4px;
            animation: pullCapAnimation 2.5s infinite ease-in-out;
        }
        @keyframes pullCapAnimation {
            0%, 20%, 100% {
                transform: translateY(12px); /* 蓋上狀態 */
            }
            50%, 70% {
                transform: translateY(-22px); /* 拔起狀態 */
            }
        }

        /* 影片同款：可愛軟萌立體硬陰影與點擊回饋 */
        .cute-shadow {
            box-shadow: 5px 5px 0px 0px #4a2e1b;
        }
        .cute-shadow-sm {
            box-shadow: 3px 3px 0px 0px #4a2e1b;
        }
        .cute-btn-active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px #4a2e1b;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 select-none">

    <div class="w-full max-w-md bg-white border-3 border-[#4a2e1b] rounded-3xl cute-shadow overflow-hidden transition-all my-4">
        
        <div class="pt-8 pb-4 px-6 text-center bg-gradient-to-b from-[#faf5ee] to-white">
            <h1 class="text-3xl font-black text-[#4a2e1b] tracking-wider font-bungee flex items-center justify-center gap-2">
                猛健樂計算機
            </h1>
            <div class="w-16 h-1 bg-[#4a2e1b] mx-auto mt-4 rounded-full opacity-80"></div>
        </div>

        <div class="flex border-b-3 border-[#4a2e1b] bg-[#faf6f0]">
            <button id="tab1Btn" onclick="switchTab(1)" class="w-1/2 py-4 text-center font-black text-[#4a2e1b] bg-white border-r-3 border-[#4a2e1b] rounded-none transition-all cursor-pointer focus:outline-none text-base">
                常規施打計算與教學
            </button>
            <button id="tab2Btn" onclick="switchTab(2)" class="w-1/2 py-4 text-center font-bold text-[#bfa99b] transition-all hover:text-[#4a2e1b] cursor-pointer focus:outline-none text-base">
                BD 針筒殘劑抽取
            </button>
        </div>

        <div class="p-6 bg-white">
            
            <div id="contentTab1" class="space-y-6">
                <div class="bg-[#fdfbf9] border-2 border-[#4a2e1b] p-4 rounded-2xl cute-shadow-sm">
                    <label class="block text-sm font-black text-[#4a2e1b] mb-2">💡 目前使用的筆針規格 (mg)</label>
                    <select id="penSpec" oninput="updateCalculations()" class="w-full p-3 bg-white border-2 border-[#4a2e1b] rounded-xl text-[#4a2e1b] font-bold focus:outline-none cursor-pointer">
                        <option value="2.5">2.5 mg</option>
                        <option value="5.0">5.0 mg</option>
                        <option value="7.5">7.5 mg</option>
                        <option value="10.0" selected>10.0 mg</option>
                        <option value="12.5">12.5 mg</option>
                        <option value="15.0">15.0 mg</option>
                    </select>
                </div>

                <div class="bg-[#fdfbf9] border-2 border-[#4a2e1b] p-4 rounded-2xl cute-shadow-sm">
                    <label class="block text-sm font-black text-[#4a2e1b] mb-2">🎯 客戶實際要施打的劑量 (mg)</label>
                    <input type="number" id="requiredDose" value="2.5" step="0.1" min="0" oninput="updateCalculations()" class="w-full p-3 bg-white border-2 border-[#4a2e1b] rounded-xl text-[#4a2e1b] font-black focus:outline-none text-lg">
                </div>

                <div class="bg-gradient-to-br from-[#fffbeb] to-[#fef3c7] border-3 border-[#4a2e1b] rounded-2xl p-5 text-center cute-shadow-sm space-y-3 relative overflow-hidden">
                    <div class="text-xs font-black tracking-widest text-[#92400e] uppercase">✨ 建議旋轉規格</div>
                    <div class="flex items-baseline justify-center gap-1">
                        <span id="clickResult" class="text-5xl font-black text-[#4a2e1b] font-bungee">15</span>
                        <span class="text-lg font-black text-[#4a2e1b]">格</span>
                    </div>
                    <div class="text-xs font-bold text-[#b45309] bg-white/60 py-1 px-3 rounded-full inline-block border border-[#d97706]/30">
                        對應施打體積：<span id="volumeResult" class="font-bold">0.15</span> ml
                    </div>
                </div>

                <div class="border-2 border-[#4a2e1b] rounded-2xl overflow-hidden cute-shadow-sm bg-[#faf6f0]">
                    <div class="bg-[#4a2e1b] p-3 text-white text-center font-black text-sm tracking-wider">
                        📖 互動式居家施打 SOP 教學
                    </div>
                    
                    <div class="p-4 bg-white border-b-2 border-[#4a2e1b] space-y-2">
                        <div class="flex justify-between text-xs font-black text-[#7c5335]">
                            <span>開始前置</span>
                            <span class="bg-[#4a2e1b] text-white px-2 py-0.5 rounded-full font-bungee">STEP <span id="stepNumberLabel">1</span>/4</span>
                            <span>完成注射</span>
                        </div>
                        <input type="range" id="stepSlider" min="1" max="4" value="1" oninput="changeStep(this.value)" class="w-full h-3 bg-[#eaddca] rounded-lg appearance-none cursor-pointer accent-[#4a2e1b]">
                    </div>

                    <div class="p-6 bg-[#fffdfa] min-h-[170px] flex items-center justify-between gap-4">
                        <div class="w-2/3 space-y-2">
                            <h4 id="stepTitle" class="text-base font-black text-[#4a2e1b]">1. 直直拔起筆蓋</h4>
                            <p id="stepDesc" class="text-xs font-bold text-[#7c5335] leading-relaxed">請將注射筆蓋直直拔起打開，並使用全新酒精棉片確實消毒前方的紅色內膜膜面。</p>
                        </div>
                        <div id="stepAnimationBox" class="w-1/3 flex items-center justify-center border-2 border-dashed border-[#bfa99b] rounded-xl p-2 bg-white min-h-[100px]">
                            <div class="pen-container">
                                <div class="pen-body"><div class="pen-inner-membrane"></div></div>
                                <div class="pen-cap"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="contentTab2" class="hidden space-y-6">
                <div class="bg-[#fdfbf9] border-2 border-[#4a2e1b] p-4 rounded-2xl cute-shadow-sm">
                    <label class="block text-sm font-black text-[#4a2e1b] mb-2">🧪 預計要抽取的藥液體積 (ml)</label>
                    <input type="number" id="targetVolume" value="0.15" step="0.01" min="0" oninput="calculateSyringeUnits()" class="w-full p-3 bg-white border-2 border-[#4a2e1b] rounded-xl text-[#4a2e1b] font-black focus:outline-none text-lg">
                </div>

                <div class="bg-gradient-to-br from-[#f0fdf4] to-[#dcfce7] border-3 border-[#4a2e1b] rounded-2xl p-5 text-center cute-shadow-sm space-y-3">
                    <div class="text-xs font-black tracking-widest text-[#166534] uppercase font-bungee">💉 BD 針筒對應刻度</div>
                    <div class="flex items-baseline justify-center gap-1">
                        <span id="syringeResult" class="text-5xl font-black text-[#4a2e1b] font-bungee">15</span>
                        <span class="text-lg font-black text-[#4a2e1b]">條線 (針筒單位)</span>
                    </div>
                    <p class="text-xs font-bold text-[#15803d] bg-white/60 py-1.5 px-3 rounded-xl inline-block border border-[#22c55e]/30">
                        提示：適用於 1ml (100條線) 的 U-100 胰島素空針
                    </p>
                </div>

                <div class="border-2 border-[#4a2e1b] rounded-2xl p-4 bg-[#fffbeb] space-y-2">
                    <div class="flex items-center gap-2 text-sm font-black text-[#92400e]">
                        <span>⚠️ 殘劑無菌操作嚴格提醒</span>
                    </div>
                    <ul class="text-xs font-medium text-[#78350f] list-disc list-inside space-y-1.5 leading-relaxed">
                        <li>抽取殘劑屬於<b>仿單標
