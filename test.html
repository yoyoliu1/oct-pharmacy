<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>時悅藥局 — 猛健樂劑量與殘劑精算計算機</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* 全域樣式設定：引進現代幾何黑體風格 */
        * {
            box-sizing: border-box;
            font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #F9F8F6; /* 溫柔舒緩的藥局現代米白底色 */
            color: #3A3A3A;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 24px 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* ------------------------------------------------------------------
           ✨ 核心品牌視覺：傾斜滿版 Logo 浮水印技術
           ------------------------------------------------------------------ */
        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            
            /* 讀取您剛上傳的去背 Logo 圖檔 */
            background-image: url('1000018760-removebg.png'); 
            background-repeat: repeat;
            background-size: 130px 130px; /* 控制每個重複小浮水印的大小 */
            
            /* 傾斜 25 度角 */
            transform: rotate(-25deg); 
            
            /* 設定 4% 的極低透明度，優雅隱約不干擾數字閱讀 */
            opacity: 0.04; 
            
            z-index: -1; /* 強制置於所有圖層最底層 */
            pointer-events: none; /* 滑鼠或手指點擊自動穿透，不影響按鈕操作 */
        }

        /* 計算機主容器 */
        .calculator-container {
            width: 100%;
            max-width: 480px;
            margin-top: 8px;
        }

        /* 頁首標題區 */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header .brand-subtitle {
            font-size: 13px;
            letter-spacing: 4px;
            color: #8A8884;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .header .main-title {
            font-size: 21px;
            font-weight: 700;
            color: #2E2E2E;
            line-height: 1.4;
        }

        /* 分頁標籤樣式 */
        .tabs-group {
            display: flex;
            background-color: #EFEFEF;
            border-radius: 12px 12px 0 0;
            padding: 4px 4px 0 4px;
        }
        .tab-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 14px 8px;
            font-size: 15px;
            font-weight: 500;
            color: #7A7A7A;
            cursor: pointer;
            text-align: center;
            border-radius: 10px 10px 0 0;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background-color: #FFFFFF;
            color: #3A3A3A;
            font-weight: 700;
        }

        /* 主要計算卡片面板 */
        .main-card {
            background-color: #FFFFFF;
            border-radius: 0 0 16px 16px;
            padding: 24px 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.02);
            margin-bottom: 20px;
        }

        /* 表單輸入區塊 */
        .input-block {
            margin-bottom: 20px;
        }
        .input-label {
            display: block;
            font-size: 15px;
            color: #5A5A5A;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            height: 48px;
            border: 1px solid #E2E2E2;
            border-radius: 8px;
            padding: 0 14px;
            font-size: 16px;
            color: #333333;
            background-color: #FFFFFF;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        .form-control:focus {
            border-color: #8A8884;
        }

        /* 下拉選單箭頭裝飾 */
        select.form-control {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23777777' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }

        /* 計算結果展現區 */
        .result-section {
            text-align: center;
            margin-top: 28px;
            padding-top: 12px;
        }
        .result-title {
            font-size: 14px;
            color: #8A8884;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .result-main {
            font-size: 48px;
            font-weight: 700;
            color: #2A2A2A;
            margin-bottom: 8px;
            display: flex;
            align-items: baseline;
            justify-content: center;
        }
        .result-main .unit {
            font-size: 20px;
            font-weight: 500;
            color: #5A5A5A;
            margin-left: 6px;
        }
        .result-badge {
            display: inline-block;
            background-color: #F5F5F3;
            color: #6A6A6A;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        /* 底部衛教區塊 */
        .education-card {
            background-color: #FFFFFF;
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.01);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .education-title {
            font-size: 14px;
            font-weight: 500;
            color: #6A6A6A;
        }
        .play-btn {
            background-color: #F5F5F3;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: #4A4A4A;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        
        <div class="header">
            <div class="brand-subtitle">OCT. PHARMACY</div>
            <div class="main-title">時悅藥局 — 猛健樂劑量與<br>殘劑精算計算機</div>
        </div>

        <div class="tabs-group">
            <button class="tab-btn active">常規施打計算與教學</button>
            <button class="tab-btn">BD 針筒殘劑抽取</button>
        </div>

        <div class="main-card">
            
            <div class="input-block">
                <label class="input-label" for="penSpec">目前使用的筆針規格 (mg)</label>
                <select id="penSpec" class="form-control" onchange="performCalculation()">
                    <option value="2.5">2.5 mg</option>
                    <option value="5.0">5.0 mg</option>
                    <option value="7.5">7.5 mg</option>
                    <option value="10.0" selected>10.0 mg</option>
                    <option value="12.5">12.5 mg</option>
                    <option value="15.0">15.0 mg</option>
                </select>
            </div>

            <div class="input-block">
                <label class="input-label" for="targetDose">客戶實際要施打的劑量 (mg)</label>
                <input type="number" id="targetDose" class="form-control" value="2.5" step="0.1" min="0" oninput="performCalculation()">
            </div>

            <div class="result-section">
                <div class="result-title">建議旋轉格數</div>
                <div class="result-main">
                    <span id="clickResult">15</span>
                    <span class="unit">格</span>
                </div>
                <div class="result-badge">
                    對應施打體積 : <span id="volumeResult">0.15</span> ml
                </div>
            </div>

        </div>

        <div class="education-card">
            <div class="education-title">互動式衛教指引</div>
            <button class="play-btn">▶ 自動播放</button>
        </div>

    </div>

    <script>
        function performCalculation() {
            const penSpec = parseFloat(document.getElementById('penSpec').value);
            const targetDose = parseFloat(document.getElementById('targetDose').value);
            
            const clickElement = document.getElementById('clickResult');
            const volumeElement = document.getElementById('volumeResult');

            // 驗證欄位安全數值
            if (isNaN(penSpec) || isNaN(targetDose) || penSpec <= 0 || targetDose <= 0) {
                clickElement.innerText = "--";
                volumeElement.innerText = "0.00";
                return;
            }

            /* 💡 根據時悅藥局官方數據精密推算公式：
              標準 Mounjaro 筆針滿劑量皆為 60 格，對應總體積為 0.60 ml。
              格數公式 = (目標劑量 / 筆針規格) * 60
              體積公式 = 格數 * 0.01 ml
            */
            let calculatedClicks = (targetDose / penSpec) * 60;
            calculatedClicks = Math.round(calculatedClicks); // 四捨五入至整數格

            const calculatedVolume = (calculatedClicks * 0.01).toFixed(2);

            // 即時更新到網頁畫面上
            clickElement.innerText = calculatedClicks;
            volumeElement.innerText = calculatedVolume;
        }

        // 初始化時自動計算一次
        window.onload = performCalculation;
    </script>

</body>
</html>
