<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猛健樂計算機</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #F7F5F0;
            color: #333333;
        }
        .bg-primary { background-color: #BFB3A4; }
        .text-primary { color: #BFB3A4; }
        .border-primary { border-color: #BFB3A4; }
        
        .jp-card {
            background-color: #FFFFFF;
            border: 1px solid #EAE6DF;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(191, 179, 164, 0.08);
        }
        
        .jp-input {
            border: 1px solid #CCCCCC;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .jp-input:focus {
            border-color: #BFB3A4;
            outline: none;
            box-shadow: 0 0 0 3px rgba(191, 179, 164, 0.2);
        }
        
        .warning-state {
            border-color: #A94442 !important;
            background-color: #FFF5F5;
        }
        .text-warning { color: #A94442; }

        /* 步驟插圖轉場動畫 */
        .slide-fade-enter {
            opacity: 0;
            transform: translateY(6px);
            transition: all 0.35s ease-out;
        }
        .slide-fade-enter-active {
            opacity: 1;
            transform: translateY(0);
        }
        .progress-bar-fill {
            transition: width 0.3s ease;
        }

        /* ========================================== */
        /* 修正後的精準軸向微動畫 (修正旋鈕翻轉問題) */
        /* ========================================== */
        
        /* 步驟1: 筆蓋水平直直拔起 */
        @keyframes animCapPull {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-12px); }
        }
        .anim-cap-pull { animation: animCapPull 2s infinite ease-in-out; }

        /* 步驟2 & 7: 酒精棉片溫和擦拭 */
        @keyframes animWipe {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(4px, -2px); }
            75% { transform: translate(-4px, 2px); }
        }
        .anim-wipe { animation: animWipe 1.2s infinite ease-in-out; }

        /* 步驟3: 針頭直推滑入與局部旋緊弧線 */
        @keyframes animNeedleSlide {
            0% { transform: translateX(-10px); opacity: 0; }
            40% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes animScrewTwist {
            0%, 40% { opacity: 0; transform: rotate(-20deg); }
            70%, 90% { opacity: 1; transform: rotate(40deg); }
            100% { opacity: 0; transform: rotate(40deg); }
        }
        .anim-needle-slide { animation: animNeedleSlide 2.5s infinite ease-in-out; }
        .anim-screw-twist { animation: animScrewTwist 2.5s infinite ease-in-out; transform-origin: 40px 32px; }

        /* 步驟4 & 6: 修正後的劑量鈕圓柱體軸向滾動錯視（旋鈕本身不翻轉） */
        @keyframes animKnobRidges {
            0% { transform: translateY(0); }
            100% { transform: translateY(-4px); } /* 剛好是一格紋路的間距，形成無限滾動錯視 */
        }
        @keyframes animArrowPulse {
            0%, 100% { opacity: 0.2; transform: translateX(-1px); }
            50% { opacity: 1; transform: translateX(1px); }
        }
        .anim-knob-ridges { animation: animKnobRidges 0.5s infinite linear; }
        .anim-arrow-pulse { animation: animArrowPulse 1.5s infinite ease-in-out; }

        /* 步驟5: 輕敲注射匣與排氣滴落 */
        @keyframes animTapPen {
            0%, 100% { transform: rotate(0deg); }
            10%, 30% { transform: rotate(-2deg); }
            20%, 40% { transform: rotate(2deg); }
        }
        @keyframes animDropLeak {
            0%, 40% { opacity: 0; transform: translateY(4px) scale(0.5); }
            60% { opacity: 1; transform: translateY(0) scale(1); }
            90%, 100% { opacity: 0; transform: translateY(-16px) scale(0.6); }
        }
        .anim-tap-pen { animation: animTapPen 2.5s infinite ease-in-out; transform-origin: 32px 48px; }
        .anim-drop-leak { animation: animDropLeak 2.5s infinite ease-in-out; }

        /* 步驟7: 部位環形擴散波 */
        @keyframes animPulseRing {
            0% { transform: scale(0.7); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .anim-pulse-ring { animation: animPulseRing 1.6s infinite cubic-bezier(0.215, 0.610, 0.355, 1); transform-origin: 32px 36px; }

        /* 步驟8: 垂直刺入與按鈕下壓 */
        @keyframes animInjectDown {
            0%, 100% { transform: translateY(-10px); }
            40%, 80% { transform: translateY(4px); }
        }
        @keyframes animButtonPress {
            0%, 40%, 100% { transform: translateY(0); }
            55%, 75% { transform: translateY(4px); }
        }
        .anim-inject-down { animation: animInjectDown 3s infinite ease-in-out; }
        .anim-button-press { animation: animButtonPress 3s infinite ease-in-out; }

        /* 步驟9: 5秒圓環倒數計時 */
        @keyframes animTimerSpin {
            from { stroke-dashoffset: 113; }
            to { stroke-dashoffset: 0; }
        }
        .anim-timer-spin { stroke-dasharray: 113; animation: animTimerSpin 5s infinite linear; transform: rotate(-90deg); transform-origin: 32px 32px; }

        /* 步驟10: 平直拔出順利完成 */
        @keyframes animLiftUp {
            0%, 100% { transform: translateY(6px); opacity: 1; }
            50% { transform: translateY(-12px); opacity: 0.6; }
        }
        .anim-lift-up { animation: animLiftUp 2.2s infinite ease-in-out; }
    </style>
</head>
<body class="min-h-screen py-6 px-4 md:py-12">

    <div class="max-w-2xl mx-auto">
        <!-- 頁首標題 -->
        <header class="text-center mb-8">
            <div class="text-xs tracking-[0.3em] font-bold text-gray-400 uppercase mb-2">OCT. PHARMACY</div>
            <h1 class="text-2xl md:text-3xl font-bold tracking-wide text-gray-800">猛健樂計算機</h1>
            <div class="h-[1px] w-12 bg-[#BFB3A4] mx-auto mt-4"></div>
        </header>

        <!-- 分頁切換卡片 -->
        <div class="flex justify-center space-x-2 mb-6">
            <button id="tabABtn" onclick="switchTab('A')" class="px-5 py-2.5 text-sm font-medium rounded-t-md border-b-2 border-primary text-gray-800 bg-white shadow-sm transition-all">
                常規施打計算與教學
            </button>
            <button id="tabBBtn" onclick="switchTab('B')" class="px-5 py-2.5 text-sm font-medium rounded-t-md border-b-2 border-transparent text-gray-500 hover:text-gray-800 transition-all">
                BD 針筒殘劑抽取
            </button>
        </div>

        <!-- ========================================== -->
        <!-- 功能模組 A：常規施打計算與動態教學 -->
        <!-- ========================================== -->
        <div id="panelA">
            <!-- 劑量計算區 -->
            <div class="jp-card p-6 md:p-8 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-2">目前使用的筆針規格 (mg)</label>
                        <select id="penSpecA" class="w-full p-3 jp-input bg-white text-gray-700">
                            <option value="2.5">2.5 mg</option>
                            <option value="5">5 mg</option>
                            <option value="7.5">7.5 mg</option>
                            <option value="10">10 mg</option>
                            <option value="12.5">12.5 mg</option>
                            <option value="15">15 mg</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-2">客戶實際要施打的劑量 (mg)</label>
                        <input type="number" id="targetDoseA" value="2.5" step="0.1" min="0" class="w-full p-3 jp-input text-gray-700" placeholder="請輸入劑量">
                    </div>
                </div>

                <div class="border-t border-gray-100 pt-6 text-center">
                    <div class="text-sm text-gray-400 mb-1">建議旋轉格數</div>
                    <div class="text-4xl font-semibold text-gray-800 tracking-tight my-2">
                        <span id="resultClicksA" class="text-stone-700">0</span> <span class="text-lg font-normal text-gray-500">格</span>
                    </div>
                    <div class="text-xs text-gray-400">對應施打體積：<span id="resultVolA">0.00</span> ml</div>
                </div>
            </div>

            <!-- 動態教學卡片（修正後精準小動畫） -->
            <div class="jp-card p-6 md:p-8 mb-6 bg-stone-50/60">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs font-bold tracking-widest text-gray-400 uppercase">互動式居家施打步驟動態指引</h2>
                    <button id="autoPlayBtn" onclick="toggleAutoPlay()" class="text-xs px-3 py-1.5 bg-white border border-gray-200 rounded shadow-sm text-gray-500 hover:bg-gray-50 transition-colors">
                        ▶ 自動播放
                    </button>
                </div>

                <!-- 進度條 -->
                <div class="w-full bg-gray-200/70 rounded-full h-1 mb-6">
                    <div id="tutorialProgress" class="bg-primary h-1 rounded-full progress-bar-fill" style="width: 10%;"></div>
                </div>

                <!-- 動態內容展示區 -->
                <div id="stepContent" class="min-h-[290px] flex flex-col justify-center items-center text-center p-6 bg-white rounded-lg border border-stone-100 shadow-sm slide-fade-enter slide-fade-enter-active">
                    <div id="stepPhase" class="text-[10px] font-bold text-white px-2.5 py-0.5 rounded-full mb-4 tracking-widest uppercase">前置準備</div>
                    
                    <!-- 動態插圖安全容器 -->
                    <div id="stepIconContainer" class="w-24 h-24 mb-4 text-stone-600 flex items-center justify-center bg-stone-50 rounded-full border border-stone-100/60 shadow-inner">
                        <!-- SVG 將由 JS 動態注入 -->
                    </div>
                    
                    <div id="stepText" class="text-sm md:text-base text-gray-700 font-medium max-w-md leading-relaxed">將注射筆蓋拔起</div>
                </div>

                <!-- 控制按鈕 -->
                <div class="flex justify-between items-center mt-6 px-1">
                    <button onclick="prevStep()" class="text-xs font-medium text-gray-400 hover:text-gray-700 transition-colors">&larr; 上一步</button>
                    <span id="stepCounter" class="text-xs font-bold text-stone-400 tracking-widest">1 / 10</span>
                    <button onclick="nextStep()" class="px-4 py-1.5 text-xs font-medium text-white bg-primary rounded hover:bg-stone-500 transition-colors">下一步 &rarr;</button>
                </div>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- 功能模組 B：進階殘劑抽取計算 -->
        <!-- ========================================== -->
        <div id="panelB" class="hidden">
            <div class="jp-card p-6 md:p-8 mb-6">
                <div id="containerB" class="border border-transparent rounded-lg p-1 transition-all">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-2">原殘劑筆針規格 (mg)</label>
                            <select id="penSpecB" class="w-full p-3 jp-input bg-white text-gray-700">
                                <option value="2.5">2.5 mg</option>
                                <option value="5">5 mg</option>
                                <option value="7.5">7.5 mg</option>
                                <option value="10">10 mg</option>
                                <option value="12.5">12.5 mg</option>
                                <option value="15">15 mg</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-2">下一次預計施打劑量 (mg)</label>
                            <input type="number" id="targetDoseB" value="2.5" step="0.1" min="0" class="w-full p-3 jp-input text-gray-700" placeholder="請輸入目標">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-2">選用的 BD 針筒規格</label>
                            <select id="syringeSpec" class="w-full p-3 jp-input bg-white text-gray-700">
                                <option value="30">BD 0.3ml (上限30U)</option>
                                <option value="50">BD 0.5ml (上限50U)</option>
                                <option value="100">BD 1.0ml (上限100U)</option>
                            </select>
                        </div>
                    </div>

                    <!-- 錯誤警告區域 -->
                    <div id="errorWarning" class="mb-5 p-3 rounded-md warning-state text-warning text-xs hidden">
                        ⚠️ 抽取劑量已超過該針筒容量上限！請更換為較大容量的 BD 針筒。
                    </div>

                    <div class="border-t border-gray-100 pt-6 text-center">
                        <div class="text-sm text-gray-400 mb-1">針筒對應抽吸刻度</div>
                        <div class="text-4xl font-semibold text-gray-800 tracking-tight my-2">
                            <span id="resultUnitsB" class="text-stone-700">0</span> <span class="text-lg font-normal text-gray-500">單位 (Units)</span>
                        </div>
                        <div class="text-xs text-gray-400">需要抽取的體積：<span id="resultVolB">0.00</span> ml</div>
                    </div>
                </div>
            </div>

            <!-- 動態操作流程 (SOP區) -->
            <div id="sopSection">
                <h2 class="text-xs font-bold tracking-widest text-gray-400 uppercase mb-4 pl-1">居家殘劑抽取安全 SOP 指引</h2>
                <div class="space-y-3" id="sopList">
                    <!-- 透過 JS 動態注入 -->
                </div>
            </div>
        </div>

        <footer class="text-center mt-12 text-xs text-gray-400 tracking-wide">
            © 2026 時悅藥局 OCT. PHARMACY • 溫潤極簡 專業守護
        </footer>
    </div>

    <!-- 核心運算與動態插圖互動邏輯 -->
    <script>
        let currentTab = 'A';

        // === 分頁切換邏輯 ===
        function switchTab(tab) {
            currentTab = tab;
            const tabABtn = document.getElementById('tabABtn');
            const tabBBtn = document.getElementById('tabBBtn');
            const panelA = document.getElementById('panelA');
            const panelB = document.getElementById('panelB');

            if (tab === 'A') {
                tabABtn.className = "px-5 py-2.5 text-sm font-medium rounded-t-md border-b-2 border-primary text-gray-800 bg-white shadow-sm transition-all";
                tabBBtn.className = "px-5 py-2.5 text-sm font-medium rounded-t-md border-b-2 border-transparent text-gray-500 hover:text-gray-800 transition-all";
                panelA.classList.remove('hidden');
                panelB.classList.add('hidden');
            } else {
                tabBBtn.className = "px-5 py-2.5 text-sm font-medium rounded-t-md border-b-2 border-primary text-gray-800 bg-white shadow-sm transition-all";
                tabABtn.className = "px-5 py-2.5 text-sm font-medium rounded-t-md border-b-2 border-transparent text-gray-500 hover:text-gray-800 transition-all";
                panelA.classList.add('hidden');
                panelB.classList.remove('hidden');
                calculateB();
            }
        }

        // === 模組 A：劑量計算邏輯 ===
        function calculateA() {
            const penSpec = parseFloat(document.getElementById('penSpecA').value);
            const targetDose = parseFloat(document.getElementById('targetDoseA').value) || 0;
            
            const vol = (targetDose / penSpec) * 0.6;
            const clicks = Math.round(vol / 0.01);
            
            document.getElementById('resultClicksA').innerText = isNaN(clicks) ? 0 : clicks;
            document.getElementById('resultVolA').innerText = isNaN(vol) ? "0.00" : vol.toFixed(2);
            
            updateDynamicTutorialText(clicks);
        }

        // === 模組 A：10大步驟動作特製動態插圖資料庫 (修正旋鈕與針頭轉動方向) ===
        const svgIcons = {
            // 步驟1: 筆蓋水平直直拔起打開
            step1: `<svg class="w-16 h-16 text-[#8C7E6E]" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M26 26h24v12H26z" stroke-dasharray="1 1"/>
                <path d="M26 28h22v8H26z"/>
                <g class="anim-cap-pull">
                    <path d="M26 25H12v14h14V25z" fill="#FFFFFF"/>
                    <path d="M8 32h4"/>
                </g>
            </svg>`,
            // 步驟2: 以酒精棉片擦拭內膜
            step2: `<svg class="w-16 h-16 text-[#8C7E6E]" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M38 28h16v8H38z"/>
                <path d="M38 30l-4 1v2l4 1z" fill="#BFB3A4"/>
                <g class="anim-wipe">
                    <rect x="22" y="24" width="10" height="16" rx="1" fill="#BFB3A4" fill-opacity="0.2"/>
                    <rect x="22" y="24" width="10" height="16" rx="1"/>
                </g>
            </svg>`,
            // 步驟3: 針頭直推滑入後旋轉固定 (修正: 針頭做平移推進，加局部旋緊弧線箭頭)
            step3: `<svg class="w-16 h-16 text-[#8C7E6E]" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M38 27h16v10H38z"/>
                <g class="anim-needle-slide">
                    <path d="M22 25h10v14H22z" fill="#FFFFFF"/>
                    <path d="M12 32h10"/>
                </g>
                <g class="anim-screw-twist">
                    <path d="M36 20a10 10 0 0 1 8 6" stroke="#BFB3A4" stroke-width="1.2" stroke-dasharray="1.5 1.5"/>
                    <path d="M44 23l2 3-3 1" fill="#BFB3A4"/>
                </g>
            </svg>`,
            // 步驟4: 軸向轉動旋鈕至排氣長線條 (修正: 旋鈕本體不翻轉，內部條紋滾動模擬立體轉動)
            step4: `<svg class="w-16 h-16 text-[#8C7E6E]" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="12" y="24" width="30" height="16" rx="1"/>
                <rect x="20" y="28" width="12" height="8" fill="#F7F5F0"/>
                <line x1="23" y1="32" x2="29" y2="32" stroke-width="2"/>
                <g>
                    <mask id="knobMask4">
                        <rect x="42" y="26" width="8" height="12" rx="1" fill="white"/>
                    </mask>
                    <rect x="42" y="26" width="8" height="12" rx="1" fill="#FFFFFF"/>
                    <g mask="url(#knobMask4)">
                        <g class="anim-knob-ridges">
                            <line x1="42" y1="20" x2="50" y2="20" stroke="#8C7E6E" stroke-width="1"/>
                            <line x1="42" y1="24" x2="50" y2="24" stroke="#8C7E6E" stroke-width="1"/>
                            <line x1="42" y1="28" x2="50" y2="28" stroke="#8C7E6E" stroke-width="1"/>
                            <line x1="42" y1="32" x2="50" y2="32" stroke="#8C7E6E" stroke-width="1"/>
                            <line x1="42" y1="36" x2="50" y2="36" stroke="#8C7E6E" stroke-width="1"/>
                            <line x1="42" y1="40" x2="50" y2="40" stroke="#8C7E6E" stroke-width="1"/>
                            <line x1="42" y1="44" x2="50" y2="44" stroke="#8C7E6E" stroke-width="1"/>
                        </g>
                    </g>
                    <rect x="42" y="26" width="8" height="12" rx="1"/>
                </g>
                <path class="anim-arrow-pulse" d="M46 19a5 5 0 0 1 5 5c0 2-1 4-3 5" stroke="#BFB3A4" stroke-width="1.2"/>
                <path class="anim-arrow-pulse" d="M46 30l2-1M46 30l-1-2" stroke="#BFB3A4" stroke-width="1.2"/>
            </svg>`,
            // 步驟5: 針頭朝上輕敲排氣
            step5: `<svg class="w-16 h-16 text-[#8C7E6E]" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <g class="anim-tap-pen">
                    <rect x="28" y="26" width="8" height="28" rx="1"/>
                    <line x1="32" y1="26" x2="32" y2="16"/>
                </g>
                <circle class="anim-drop-leak" cx="32" cy="12" r="2" fill="#8C7E6E"/>
                <path d="M44 34l-3 2" stroke-dasharray="1 1"/>
            </svg>`,
            // 步驟6: 軸向轉動旋鈕至顯示為 1 (修正: 同步使用圓柱體紋路軸向滾動，旋鈕不倒立翻轉)
            step6: `<svg class="w-16 h-16 text-[#8C7E6E]" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="12" y="24" width="30" height="16" rx="1"/>
                <rect x="20" y="28" width="12" height="8" fill="#F7F5F0"/>
                <text x="24" y="35" font-family="sans-serif" font-size="8" font-weight="bold" fill="#333333">1</text>
                <g>
                    <mask id="knobMask6">
                        <rect x="42" y="26" width="8" height="12" rx="1" fill="white"/>
                    </mask>
                    <rect x="42" y="26" width="8" height="12" rx="1" fill="#FFFFFF"/>
                    <g mask="url(#knobMask6)">
                        <g class="anim-knob-ridges">
                            <line x1="42" y1="20" x2="50" y2="20" stroke="#8C7E6E" stroke-width="1"/>
                            <line x1="42" y1="24" x2="50" y2="24" stroke="#8C7E6E" stroke-width="1"/>
                            <line x1="42" y1="28" x2="50" y2="28" stroke="#8C7E6E" stroke-width="1"/>
                            <line x1="42" y1="32" x2="50" y2="32" stroke="#8C7E6E" stroke-width="1"/>
                            <line x1="42" y1="36" x2="50" y2="36" stroke="#8C7E6E" stroke-width="1"/>
                            <line x1="42" y1="40" x2="50" y2="40" stroke="#8C7E6E" stroke-width="1"/>
                            <line x1="42" y1="44" x2="50" y2="44" stroke="#8C7E6E" stroke-width="1"/>
                        </g>
                    </g>
                    <rect x="42" y="26" width="8" height="12" rx="1"/>
                </g>
                <path class="anim-arrow-pulse" d="M46 19a5 5 0 0 1 5 5c0 2-1 4-3 5" stroke="#BFB3A4" stroke-width="1.2"/>
                <path class="anim-arrow-pulse" d="M46 30l2-1M46 30l-1-2" stroke="#BFB3A4" stroke-width="1.2"/>
            </svg>`,
            // 步驟7: 部位清潔消毒
            step7: `<svg class="w-16 h-16 text-[#8C7E6E]" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 46c12-5 28-5 40 0" stroke-width="1.5"/>
                <circle class="anim-pulse-ring" cx="32" cy="36" r="10" stroke="#BFB3A4" stroke-width="1"/>
                <g class="anim-wipe">
                    <circle cx="32" cy="36" r="3" fill="#8C7E6E"/>
                </g>
            </svg>`,
            // 步驟8: 垂直刺入皮下，穩定按下注射鈕到底
            step8: `<svg class="w-16 h-16 text-[#8C7E6E]" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="50" x2="52" y2="50" stroke-width="1.5"/>
                <g class="anim-inject-down">
                    <rect x="28" y="16" width="8" height="26" fill="#FFFFFF"/>
                    <line x1="32" y1="42" x2="32" y2="50" stroke-width="1.5"/>
                    <path class="anim-button-press" d="M29 16v-5h6v5z" fill="#BFB3A4"/>
                </g>
            </svg>`,
            // 步驟9: 皮下靜止等候 5 秒鐘
            step9: `<svg class="w-16 h-16 text-[#8C7E6E]" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="32" cy="32" r="20" stroke="#EAE6DF" stroke-width="2"/>
                <circle class="anim-timer-spin" cx="32" cy="32" r="18" stroke="#BFB3A4" stroke-width="2" fill="none"/>
                <text x="32" y="36" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#333333">5s</text>
            </svg>`,
            // 步驟10: 平直拔出針頭完成
            step10: `<svg class="w-16 h-16 text-[#8C7E6E]" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="52" x2="52" y2="52" stroke-dasharray="2 2"/>
                <g class="anim-lift-up">
                    <rect x="28" y="14" width="8" height="26" fill="#FFFFFF"/>
                    <line x1="32" y1="40" x2="32" y2="46"/>
                    <path d="M24 10l8-6 8 6" stroke-width="1"/>
                </g>
            </svg>`
        };

        const tutorialSteps = [
            { phase: "前置準備", icon: svgIcons.step1, text: "將注射筆蓋直直拔起打開" },
            { phase: "前置準備", icon: svgIcons.step2, text: "以酒精棉片溫和且徹底地擦拭前緣紅色內膜" },
            { phase: "前置準備", icon: svgIcons.step3, text: "撕開針頭紙質封口，將蓋上蓋子的針頭直推到注射筆上，隨後順時針旋轉直至拴緊" },
            { phase: "排氣動作", icon: svgIcons.step4, text: "旋轉劑量旋鈕直到您聽到 2 聲清脆的喀嗒聲，並在視窗中看到排氣長線條" },
            { phase: "排氣動作", icon: svgIcons.step5, text: "將針頭朝上，輕敲注射筆藥匣使氣泡聚集至上方；隨後按到底排出空氣與微量藥液" },
            { phase: "開始注射", icon: svgIcons.step6, text: "調整劑量旋鈕，直至劑量視窗顯示為 1（表示完整劑量）" }, 
            { phase: "開始注射", icon: svgIcons.step7, text: "選定注射部位（腹部、大腿或上臂外側），以酒精棉片由內向外清潔消毒並待風乾" },
            { phase: "開始注射", icon: svgIcons.step8, text: "將針頭垂直平順地刺入您的皮膚中，隨後穩定按壓下劑量旋鈕直到停止為止" },
            { phase: "開始注射", icon: svgIcons.step9, text: "確認劑量視窗完全回歸為 0 提示圖示，並於皮下靜止默數 5 秒鐘確保藥物完全吸收" },
            { phase: "開始注射", icon: svgIcons.step10, text: "平直將針頭拔出皮膚（針尖有一滴藥物屬正常現象），小心將外罩蓋回並妥善儲存注射筆" }
        ];

        let currentStepIndex = 0;
        let autoPlayInterval = null;
        let isAutoPlaying = false;

        function updateDynamicTutorialText(calculatedClicks) {
            if(calculatedClicks > 0 && !isNaN(calculatedClicks)) {
                tutorialSteps[5].text = `調整劑量旋鈕，直至劑量視窗顯示為 1（或依照藥師為您精算的建議，精準旋轉至 <span class="text-stone-700 font-bold border-b border-stone-400 px-1 text-lg">${calculatedClicks}</span> 格）`;
            } else {
                tutorialSteps[5].text = "調整劑量旋鈕，直至劑量視窗顯示為 1（表示完整劑量）";
            }
            if(currentStepIndex === 5) renderStep();
        }

        function renderStep() {
            const step = tutorialSteps[currentStepIndex];
            const contentDiv = document.getElementById('stepContent');
            
            contentDiv.classList.remove('slide-fade-enter-active');
            void contentDiv.offsetWidth; 
            contentDiv.classList.add('slide-fade-enter-active');

            document.getElementById('stepPhase').innerText = step.phase;
            
            if (step.phase === '前置準備') {
                document.getElementById('stepPhase').className = "text-[10px] font-bold text-white bg-stone-400 px-2.5 py-0.5 rounded-full mb-4 tracking-widest uppercase";
            } else if (step.phase === '排氣動作') {
                document.getElementById('stepPhase').className = "text-[10px] font-bold text-white bg-primary px-2.5 py-0.5 rounded-full mb-4 tracking-widest uppercase";
            } else {
                document.getElementById('stepPhase').className = "text-[10px] font-bold text-white bg-stone-600 px-2.5 py-0.5 rounded-full mb-4 tracking-widest uppercase";
            }

            document.getElementById('stepIconContainer').innerHTML = step.icon;
            document.getElementById('stepText').innerHTML = step.text;
            document.getElementById('stepCounter').innerText = `${currentStepIndex + 1} / 10`;
            
            const progressPercent = ((currentStepIndex + 1) / 10) * 100;
            document.getElementById('tutorialProgress').style.width = `${progressPercent}%`;
        }

        function nextStep() {
            currentStepIndex = (currentStepIndex + 1) % tutorialSteps.length;
            renderStep();
        }

        function prevStep() {
            currentStepIndex = (currentStepIndex - 1 + tutorialSteps.length) % tutorialSteps.length;
            renderStep();
        }

        function toggleAutoPlay() {
            const btn = document.getElementById('autoPlayBtn');
            if (isAutoPlaying) {
                clearInterval(autoPlayInterval);
                btn.innerHTML = "▶ 自動播放";
                btn.classList.remove('bg-primary', 'text-white');
                btn.classList.add('bg-white', 'text-gray-500');
            } else {
                nextStep();
                autoPlayInterval = setInterval(nextStep, 5000);
                btn.innerHTML = "⏸ 暫停播放";
                btn.classList.remove('bg-white', 'text-gray-500');
                btn.classList.add('bg-primary', 'text-white', 'border-primary');
            }
            isAutoPlaying = !isAutoPlaying;
        }

        // === 模組 B：殘劑計算邏輯 ===
        function calculateB() {
            const penSpec = parseFloat(document.getElementById('penSpecB').value);
            const targetDose = parseFloat(document.getElementById('targetDoseB').value) || 0;
            const maxUnits = parseInt(document.getElementById('syringeSpec').value);
            const syringeName = document.getElementById('syringeSpec').options[document.getElementById('syringeSpec').selectedIndex].text.split('(')[0];

            const vol = (targetDose / penSpec) * 0.6;
            const units = Math.round(vol * 100);

            document.getElementById('resultUnitsB').innerText = isNaN(units) ? 0 : units;
            document.getElementById('resultVolB').innerText = isNaN(vol) ? "0.00" : vol.toFixed(2);

            const containerB = document.getElementById('containerB');
            const errorWarning = document.getElementById('errorWarning');
            
            if (units > maxUnits) {
                containerB.classList.add('warning-state');
                errorWarning.classList.remove('hidden');
            } else {
                containerB.classList.remove('warning-state');
                errorWarning.classList.add('hidden');
            }

            renderSOP(syringeName, vol.toFixed(2), units);
        }

        function renderSOP(syringeName, ml, units) {
            const safeUnits = isNaN(units) ? 0 : units;
            const safeMl = isNaN(ml) ? "0.00" : ml;

            const steps = [
                { title: "步驟 1", desc: `準備好酒精棉片、猛健樂空筆針、以及全新的 <strong class="text-stone-700">${syringeName}</strong> 針筒。` },
                { title: "步驟 2", desc: `系統評估本次需抽取 <strong class="text-stone-700">${safeMl}</strong> ml（即 <strong class="text-stone-700">${safeUnits}</strong> 單位）。` },
                { title: "步驟 3", desc: "用酒精棉片擦拭猛健樂筆針前端的紅色橡膠內膜至少 5 秒，靜待風乾。" },
                { title: "步驟 4", desc: `將 BD 針筒的推桿向後拉，使針筒內吸入 <strong class="text-stone-700">${safeUnits}</strong> 單位的空氣。` },
                { title: "步驟 5", desc: "將針頭垂直刺入橡膠塞中心，將針筒內的空氣全部推入筆針中以平衡氣壓。" },
                { title: "步驟 6", desc: `將筆針與針筒整體倒轉，慢慢將推桿向下抽吸，精準對齊至 <strong class="text-warning font-bold">${safeUnits}</strong> 單位（Units）刻度線後拔出。` },
                { title: "步驟 7", desc: "輕彈針筒壁排除微小氣泡，確認劑量無誤後即可進行皮下注射。" }
            ];

            const sopList = document.getElementById('sopList');
            sopList.innerHTML = steps.map(step => `
                <div class="bg-white p-4 rounded-lg border border-gray-100 flex items-start space-x-3 shadow-sm">
                    <span class="text-xs font-bold text-primary mt-0.5 whitespace-nowrap">${step.title}</span>
                    <p class="text-xs text-gray-600 leading-relaxed">${step.desc}</p>
                </div>
            `).join('');
        }

        document.getElementById('penSpecA').addEventListener('change', calculateA);
        document.getElementById('targetDoseA').addEventListener('input', calculateA);
        document.getElementById('penSpecB').addEventListener('change', calculateB);
        document.getElementById('targetDoseB').addEventListener('input', calculateB);
        document.getElementById('syringeSpec').addEventListener('change', calculateB);

        calculateA();
        renderStep();
    </script>
</body>
</html>
